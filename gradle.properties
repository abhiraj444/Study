# Project-wide Gradle settings.
# These work for both local Android Studio builds and GitHub Actions CI.

# JVM args for the Gradle daemon — GitHub runners have 7GB RAM, laptops have plenty.
org.gradle.jvmargs=-Xmx4g -Dfile.encoding=UTF-8 -XX:+UseParallelGC

# Performance
org.gradle.parallel=true
org.gradle.caching=true
org.gradle.configureondemand=false

# AndroidX
android.useAndroidX=true
android.nonTransitiveRClass=true

# Suppress the warning about compileSdk 35 (we target it intentionally).
android.suppressUnsupportedCompileSdk=35

# Kotlin
kotlin.code.style=official
