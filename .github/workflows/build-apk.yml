# Build StudyFlow debug APK on every push and PR.
# The APK is uploaded as a downloadable artifact.
#
# After the workflow runs (takes ~10-15 min the first time, ~3-5 min on
# subsequent runs thanks to the Gradle cache), open:
#   GitHub repo → Actions tab → click the latest run → scroll to "Artifacts"
#   → download "studyflow-debug-apk" → unzip → app-debug.apk
#
# Install on your tablet by tapping the APK (enable "Install unknown apps"
# for your file manager if prompted).

name: Build APK

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:  # lets you trigger it manually from the Actions tab

jobs:
  build:
    name: Build Debug APK
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Check out the project
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3
        with:
          packages: |
            tools
            platform-tools
            platforms;android-35
            build-tools;35.0.0

      - name: Cache Gradle dependencies and wrapper
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
            .gradle
          key: gradle-${{ runner.os }}-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties', '**/gradle.properties') }}
          restore-keys: |
            gradle-${{ runner.os }}-

      - name: Generate gradle-wrapper.jar
        working-directory: ${{ github.workspace }}
        run: gradle wrapper --gradle-version 8.7 --distribution-type bin

      - name: Grant execute permission for gradlew
        run: chmod +x ./gradlew

      - name: Build debug APK
        run: ./gradlew :app:assembleDebug --no-daemon --stacktrace

      - name: Upload APK as artifact
        uses: actions/upload-artifact@v4
        with:
          name: studyflow-debug-apk
          path: app/build/outputs/apk/debug/*.apk
          if-no-files-found: error
          retention-days: 90

      - name: Also upload build reports (helpful if build fails)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: build-reports
          path: |
            app/build/reports/
            build/reports/
          if-no-files-found: ignore
          retention-days: 14
