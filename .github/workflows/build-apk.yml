# Build StudyFlow debug APK on every push and PR.
# The APK is uploaded as a downloadable artifact.

name: Build APK

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    name: Build Debug APK
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Check out the project
        uses: actions/checkout@v4

      # Setup Java AND let it handle caching your Gradle files natively
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'
          cache: 'gradle'

      # Rely on pre-installed runner SDKs. This ensures licenses are auto-accepted.
      - name: Ensure Android SDK Environment
        run: |
          echo "ANDROID_HOME=$ANDROID_SDK_ROOT" >> $GITHUB_ENV

      # Grant execution right directly to your repository's existing wrapper
      - name: Grant execute permission for gradlew
        run: chmod +x ./gradlew

      # Assemble the debug build
      - name: Build debug APK
        run: ./gradlew :app:assembleDebug --no-daemon --stacktrace

      # Upload the final output
      - name: Upload APK as artifact
        uses: actions/upload-artifact@v4
        with:
          name: studyflow-debug-apk
          path: app/build/outputs/apk/debug/*.apk
          if-no-files-found: error
          retention-days: 90

      # Upload build reports if something inside gradle compilation complains
      - name: Also upload build reports (helpful if build fails)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: build-reports
          path: |
            app/build/reports/
            build/reports/
          if-no-files-found: ignore
          retention-days: 14
